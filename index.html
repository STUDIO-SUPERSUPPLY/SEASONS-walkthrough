<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Walkthrough</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: sans-serif; }
  canvas { display: block; }

  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    z-index: 10;
  }
  #overlay h1 { font-size: 2rem; font-weight: 300; margin-bottom: 0.5rem; letter-spacing: 0.1em; }
  #overlay p { color: #aaa; margin-bottom: 2rem; font-size: 0.95rem; }
  #overlay button {
    padding: 0.75rem 2rem;
    background: #fff;
    color: #000;
    border: none;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 4px;
    font-weight: 500;
  }
  #overlay button:hover { background: #ddd; }

  #hud {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 0.8rem;
    text-align: center;
    pointer-events: none;
    display: none;
  }

  #crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 16px;
    height: 16px;
    pointer-events: none;
    display: none;
  }
  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.6);
  }
  #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  #crosshair::after  { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }

  #loading {
    position: absolute;
    inset: 0;
    background: #000;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: #fff;
    z-index: 20;
  }
  #loading p { margin-top: 1rem; color: #aaa; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #333;
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Modell wird geladen…</p>
</div>

<div id="overlay">
  <h1>3D Walkthrough</h1>
  <p>Klicke um die Navigation zu starten</p>
  <button id="startBtn">Betreten</button>
  <div style="margin-top:2rem; color:#666; font-size:0.8rem; text-align:center; line-height:1.8;">
    W A S D — Bewegen &nbsp;|&nbsp; Maus — Umsehen<br>
    Leertaste — Aufwärts &nbsp;|&nbsp; Shift — Abwärts<br>
    ESC — Beenden
  </div>
</div>

<div id="crosshair"></div>
<div id="hud">W A S D — Bewegen &nbsp;|&nbsp; ESC — Beenden</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// ─── KONFIGURATION ────────────────────────────────────────────────────────────
const MODEL_PATH   = 'model.glb';   // ← Hier den Dateinamen deiner .glb eintragen
const START_POS    = { x: 0, y: 1.7, z: 5 };  // Startposition (y = Augenhöhe)
const MOVE_SPEED   = 0.08;          // Gehgeschwindigkeit
const FOG_COLOR    = 0x111111;      // Nebelfarbe (passt zum Hintergrund)
const FOG_NEAR     = 10;
const FOG_FAR      = 80;
const AMBIENT_INTENSITY = 1.2;
const SUN_INTENSITY     = 2.0;
// ──────────────────────────────────────────────────────────────────────────────

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(FOG_COLOR);
scene.fog = new THREE.Fog(FOG_COLOR, FOG_NEAR, FOG_FAR);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(START_POS.x, START_POS.y, START_POS.z);

const ambient = new THREE.AmbientLight(0xffffff, AMBIENT_INTENSITY);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff5e0, SUN_INTENSITY);
sun.position.set(10, 20, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 100;
sun.shadow.camera.left = -30;
sun.shadow.camera.right = 30;
sun.shadow.camera.top = 30;
sun.shadow.camera.bottom = -30;
scene.add(sun);

const controls = new PointerLockControls(camera, document.body);
scene.add(controls.getObject());

const keys = {};
document.addEventListener('keydown', e => keys[e.code] = true);
document.addEventListener('keyup',   e => keys[e.code] = false);

const overlay  = document.getElementById('overlay');
const hud      = document.getElementById('hud');
const crosshair= document.getElementById('crosshair');
const loading  = document.getElementById('loading');

document.getElementById('startBtn').addEventListener('click', () => controls.lock());

controls.addEventListener('lock', () => {
  overlay.style.display  = 'none';
  hud.style.display      = 'block';
  crosshair.style.display= 'block';
});
controls.addEventListener('unlock', () => {
  overlay.style.display  = 'flex';
  hud.style.display      = 'none';
  crosshair.style.display= 'none';
});

loading.style.display = 'flex';
const loader = new GLTFLoader();
loader.load(
  MODEL_PATH,
  (gltf) => {
    gltf.scene.traverse(node => {
      if (node.isMesh) {
        node.castShadow    = true;
        node.receiveShadow = true;
      }
    });

    const box = new THREE.Box3().setFromObject(gltf.scene);
    const center = new THREE.Vector3();
    box.getCenter(center);
    const size = new THREE.Vector3();
    box.getSize(size);

    const maxDim = Math.max(size.x, size.y, size.z);
    const scale  = maxDim > 50 ? 50 / maxDim : 1;
    gltf.scene.scale.setScalar(scale);
    gltf.scene.position.sub(center.multiplyScalar(scale));
    gltf.scene.position.y = -box.min.y * scale;

    scene.add(gltf.scene);
    loading.style.display = 'none';
  },
  (xhr) => {
    const pct = Math.round(xhr.loaded / xhr.total * 100);
    loading.querySelector('p').textContent = `Modell wird geladen… ${pct}%`;
  },
  (err) => {
    loading.querySelector('p').textContent = 'Fehler beim Laden. Bitte model.glb prüfen.';
    console.error(err);
  }
);

const dir = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);

  if (controls.isLocked) {
    dir.set(0, 0, 0);
    if (keys['KeyW'] || keys['ArrowUp'])    dir.z -= 1;
    if (keys['KeyS'] || keys['ArrowDown'])  dir.z += 1;
    if (keys['KeyA'] || keys['ArrowLeft'])  dir.x -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) dir.x += 1;
    if (dir.lengthSq() > 0) dir.normalize();

    controls.moveRight(dir.x * MOVE_SPEED);
    controls.moveForward(-dir.z * MOVE_SPEED);

    if (keys['Space'])      camera.position.y += MOVE_SPEED;
    if (keys['ShiftLeft'])  camera.position.y -= MOVE_SPEED;
  }

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
